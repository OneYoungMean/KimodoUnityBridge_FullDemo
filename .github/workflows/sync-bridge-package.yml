name: sync-bridge-package

on:
  workflow_dispatch:
    inputs:
      bridge_ref:
        description: Ref/branch/tag of OneYoungMean/KimodoUnityBridge
        required: false
        default: main
      base_branch:
        description: Target branch for the pull request in KimodoUnityBridge_FullDemo
        required: false
        default: main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-bridge-package
  cancel-in-progress: false

jobs:
  sync:
    runs-on: windows-latest

    steps:
      - name: Checkout KimodoUnityBridge_FullDemo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve workflow inputs
        id: resolved_inputs
        shell: pwsh
        run: |
          $bridgeRef = "${{ github.event.inputs.bridge_ref }}"
          if ([string]::IsNullOrWhiteSpace($bridgeRef)) {
            $bridgeRef = "main"
          }

          $baseBranch = "${{ github.event.inputs.base_branch }}"
          if ([string]::IsNullOrWhiteSpace($baseBranch)) {
            $baseBranch = "main"
          }

          $safeBranchSuffix = $baseBranch -replace '[^A-Za-z0-9._-]', '-'

          "bridge_ref=$bridgeRef" >> $env:GITHUB_OUTPUT
          "base_branch=$baseBranch" >> $env:GITHUB_OUTPUT
          "sync_branch=bot/sync-bridge-package-$safeBranchSuffix" >> $env:GITHUB_OUTPUT

      - name: Checkout KimodoUnityBridge
        uses: actions/checkout@v4
        with:
          repository: OneYoungMean/KimodoUnityBridge
          ref: ${{ steps.resolved_inputs.outputs.bridge_ref }}
          path: __bridge_source

      - name: Mirror package into Packages/KimodoUnityBridge
        shell: pwsh
        run: |
          $source = Join-Path $env:GITHUB_WORKSPACE "__bridge_source"
          $target = Join-Path $env:GITHUB_WORKSPACE "Packages\KimodoUnityBridge"

          New-Item -ItemType Directory -Force -Path $target | Out-Null
          robocopy $source $target /MIR /XD .git .github | Out-Null
          $robocopyExitCode = $LASTEXITCODE
          if ($robocopyExitCode -ge 8) {
            throw "robocopy failed with exit code $robocopyExitCode"
          }
          $global:LASTEXITCODE = 0

      - name: Detect package changes
        id: package_changes
        shell: pwsh
        run: |
          git add Packages/KimodoUnityBridge
          if (git diff --cached --quiet) {
            "changed=false" >> $env:GITHUB_OUTPUT
          }
          else {
            "changed=true" >> $env:GITHUB_OUTPUT
          }

      - name: Create sync pull request
        if: steps.package_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync KimodoUnityBridge package from ${{ steps.resolved_inputs.outputs.bridge_ref }}"
          branch: ${{ steps.resolved_inputs.outputs.sync_branch }}
          delete-branch: true
          title: "chore: sync KimodoUnityBridge package into ${{ steps.resolved_inputs.outputs.base_branch }}"
          body: |
            This PR was created automatically by `sync-bridge-package`.

            Source ref: `${{ steps.resolved_inputs.outputs.bridge_ref }}`
            Base branch: `${{ steps.resolved_inputs.outputs.base_branch }}`
            Target path: `Packages/KimodoUnityBridge`
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          base: ${{ steps.resolved_inputs.outputs.base_branch }}
          add-paths: |
            Packages/KimodoUnityBridge

      - name: Summary
        shell: pwsh
        run: |
          @(
            "Synced bridge ref: ${{ steps.resolved_inputs.outputs.bridge_ref }}"
            "Pull request base branch: ${{ steps.resolved_inputs.outputs.base_branch }}"
            "Target path: Packages/KimodoUnityBridge"
            "Package changes detected: ${{ steps.package_changes.outputs.changed }}"
          ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
