name: package-runtime

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      quickserver_ref:
        description: Ref/branch/tag of OneYoungMean/NvlabKimodoQuickServer
        required: false
        default: main
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

concurrency:
  group: package-runtime-${{ github.ref }}
  cancel-in-progress: ${{ github.actor != 'github-actions[bot]' }}

jobs:
  build-zip:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable long paths for git
        shell: pwsh
        run: git config --global core.longpaths true

      - name: Bump package patch version
        if: github.event_name == 'push'
        id: bump_version
        shell: pwsh
        run: |
          $nextVersion = .\.github\scripts\bump-package-version.ps1 -Path .\package.json
          "version=$nextVersion" >> $env:GITHUB_OUTPUT

      - name: Commit bumped package version
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "ci: bump package version to ${{ steps.bump_version.outputs.version }}" 
          git push origin HEAD:main

      - name: Read package version
        id: package_version
        shell: pwsh
        run: |
          $package = Get-Content .\package.json -Raw | ConvertFrom-Json
          "version=$($package.version)" >> $env:GITHUB_OUTPUT

      - name: Build package zip
        shell: pwsh
        env:
          QUICKSERVER_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.quickserver_ref || 'main' }}
        run: .\.github\scripts\package-runtime.ps1 -QuickServerRef "$env:QUICKSERVER_REF" -OutputZip "${{ github.workspace }}\dist\KimodoUnityBridge.zip"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: KimodoUnityBridge-v${{ steps.package_version.outputs.version }}
          path: dist/KimodoUnityBridge.zip
          if-no-files-found: error
