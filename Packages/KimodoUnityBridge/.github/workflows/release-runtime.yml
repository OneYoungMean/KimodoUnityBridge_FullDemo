name: release-runtime

on:
  workflow_dispatch:
    inputs:
      quickserver_ref:
        description: Ref/branch/tag of OneYoungMean/NvlabKimodoQuickServer
        required: false
        default: main
      prerelease:
        description: Mark this GitHub Release as a prerelease
        required: false
        default: false
        type: boolean
      release_notes:
        description: Optional release notes. Leave empty to use generated notes.
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require main branch
        if: github.ref_name != 'main'
        shell: pwsh
        run: throw "Run release-runtime from the main branch so the Release matches the auto-bumped package.json version."

      - name: Enable long paths for git
        shell: pwsh
        run: git config --global core.longpaths true

      - name: Read package version
        id: package_version
        shell: pwsh
        run: |
          $package = Get-Content .\package.json -Raw | ConvertFrom-Json
          $version = $package.version
          $tag = "v$version"
          $assetName = "KimodoUnityBridge-v$version.zip"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "asset_name=$assetName" >> $env:GITHUB_OUTPUT

      - name: Write release notes
        id: release_notes
        shell: pwsh
        env:
          INPUT_RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
          INPUT_QUICKSERVER_REF: ${{ github.event.inputs.quickserver_ref || 'main' }}
        run: |
          $notesPath = Join-Path $env:GITHUB_WORKSPACE "release-notes.md"
          $tag = "${{ steps.package_version.outputs.tag }}"
          $version = "${{ steps.package_version.outputs.version }}"

          if ([string]::IsNullOrWhiteSpace($env:INPUT_RELEASE_NOTES)) {
            @(
              "# $tag"
              ""
              "- Package version: $version"
              "- Source branch: $env:GITHUB_REF_NAME"
              "- QuickServer ref: $env:INPUT_QUICKSERVER_REF"
              "- Workflow run: $env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
            ) | Set-Content -Path $notesPath -Encoding utf8
          }
          else {
            $env:INPUT_RELEASE_NOTES | Set-Content -Path $notesPath -Encoding utf8
          }

          "path=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Build release zip
        shell: pwsh
        env:
          QUICKSERVER_REF: ${{ github.event.inputs.quickserver_ref || 'main' }}
        run: .\.github\scripts\package-runtime.ps1 -QuickServerRef "$env:QUICKSERVER_REF" -OutputZip "${{ github.workspace }}\dist\${{ steps.package_version.outputs.asset_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package_version.outputs.asset_name }}
          path: dist/${{ steps.package_version.outputs.asset_name }}
          if-no-files-found: error

      - name: Check existing release
        id: release_state
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.package_version.outputs.tag }}"
          $previousNativePreference = $PSNativeCommandUseErrorActionPreference
          $PSNativeCommandUseErrorActionPreference = $false
          try {
            gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
            $releaseExists = ($LASTEXITCODE -eq 0)
          }
          finally {
            $PSNativeCommandUseErrorActionPreference = $previousNativePreference
          }

          if ($releaseExists) {
            "exists=true" >> $env:GITHUB_OUTPUT
          }
          else {
            "exists=false" >> $env:GITHUB_OUTPUT
          }

      - name: Create GitHub Release
        if: steps.release_state.outputs.exists != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.package_version.outputs.tag }}"
          $assetName = "${{ steps.package_version.outputs.asset_name }}"
          $assetPath = Join-Path $env:GITHUB_WORKSPACE "dist\$assetName"
          $args = @(
            "release", "create", $tag,
            "$assetPath#$assetName",
            "--repo", $env:GITHUB_REPOSITORY,
            "--target", $env:GITHUB_SHA,
            "--title", $tag,
            "--notes-file", "${{ steps.release_notes.outputs.path }}"
          )
          if ("${{ github.event.inputs.prerelease }}" -eq "true") {
            $args += "--prerelease"
          }
          & gh @args
          if ($LASTEXITCODE -ne 0) {
            throw "gh release create failed with exit code $LASTEXITCODE"
          }

      - name: Update existing GitHub Release
        if: steps.release_state.outputs.exists == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.package_version.outputs.tag }}"
          $assetName = "${{ steps.package_version.outputs.asset_name }}"
          $assetPath = Join-Path $env:GITHUB_WORKSPACE "dist\$assetName"
          gh release upload $tag "$assetPath#$assetName" --clobber --repo $env:GITHUB_REPOSITORY
          if ($LASTEXITCODE -ne 0) {
            throw "gh release upload failed with exit code $LASTEXITCODE"
          }
          gh release edit $tag --repo $env:GITHUB_REPOSITORY --title $tag --notes-file "${{ steps.release_notes.outputs.path }}"
          if ($LASTEXITCODE -ne 0) {
            throw "gh release edit failed with exit code $LASTEXITCODE"
          }
